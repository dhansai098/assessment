version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
      POSTGRES_DB: ims
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims"]
      interval: 5s
      retries: 10
    volumes:
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  influxdb:
    image: influxdb:2.7-alpine
    ports: ["8086:8086"]
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ims
      DOCKER_INFLUXDB_INIT_PASSWORD: ims-password
      DOCKER_INFLUXDB_INIT_ORG: ims
      DOCKER_INFLUXDB_INIT_BUCKET: signals
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ims-dev-token

  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      PG_URL: postgres://ims:ims@postgres:5432/ims
      MONGO_URL: mongodb://mongo:27017/ims
      REDIS_URL: redis://redis:6379
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ims-dev-token
      INFLUX_ORG: ims
      INFLUX_BUCKET: signals
      PORT: "8080"
      RATE_LIMIT_RPS: "1000"
      QUEUE_MAX_SIZE: "50000"
    depends_on:
      postgres: { condition: service_healthy }
      mongo:    { condition: service_healthy }
      redis:    { condition: service_healthy }
      influxdb: { condition: service_started }

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on: [backend]
